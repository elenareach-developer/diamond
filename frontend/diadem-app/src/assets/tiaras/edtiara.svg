<?xml version="1.0" encoding="UTF-8"?>
<svg width="600" height="300" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <!-- Темно-зеленый фон -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1f14"/>
      <stop offset="100%" stop-color="#001a0f"/>
    </linearGradient>

    <!-- Золото -->
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff9100"/>
      <stop offset="100%" stop-color="#ff1744"/>
    </linearGradient>

    <!-- Изумруды -->
    <radialGradient id="emerald" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#69f0ae"/>
      <stop offset="100%" stop-color="#004d40"/>
    </radialGradient>

    <!-- Свечение -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Фон -->
  <rect width="100%" height="100%" fill="url(#bg)"/>

  <!-- Основа тиары (более волнистая) -->
  <path d="M100 300 Q250 180 400 220 Q550 180 700 300"
        stroke="url(#gold)"
        stroke-width="8"
        fill="none"
        filter="url(#glow)"/>

  <!-- Внутренние завитки -->
  <path d="M200 300 Q300 210 400 280"
        stroke="url(#gold)"
        stroke-width="4"
        fill="none"/>

  <path d="M400 280 Q500 210 600 300"
        stroke="url(#gold)"
        stroke-width="4"
        fill="none"/>

  <!-- Центральный крупный изумруд -->
  <ellipse cx="400" cy="180" rx="30" ry="40"
           fill="url(#emerald)" filter="url(#glow)"/>

  <!-- Боковые изумруды -->
  <ellipse cx="280" cy="230" rx="20" ry="28"
           fill="url(#emerald)" filter="url(#glow)"/>

  <ellipse cx="520" cy="230" rx="20" ry="28"
           fill="url(#emerald)" filter="url(#glow)"/>

  <!-- Мелкие камни -->
  <circle cx="240" cy="260" r="8" fill="#ffffff" opacity="0.8"/>
  <circle cx="320" cy="210" r="6" fill="#ffffff" opacity="0.8"/>
  <circle cx="480" cy="210" r="6" fill="#ffffff" opacity="0.8"/>
  <circle cx="560" cy="260" r="8" fill="#ffffff" opacity="0.8"/>

</svg>